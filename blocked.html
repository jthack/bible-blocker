<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Blocker</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>

  <!-- Top bar -->
  <header class="top-bar">
    <button id="settings-link" class="icon-btn" title="Settings" aria-label="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
    <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle dark mode">
      <svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="10" cy="10" r="4"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/>
      </svg>
      <svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17 11.4A7 7 0 1 1 8.6 3a5.5 5.5 0 0 0 8.4 8.4Z"/>
      </svg>
    </button>
  </header>

  <!-- Book Picker View -->
  <main id="book-picker" class="view hidden">
    <div class="picker-header">
      <h1>Choose a Book</h1>
      <p class="subtitle">Select a book of the Bible to begin your daily reading.</p>
    </div>

    <section class="testament-section">
      <h2>Old Testament</h2>
      <div class="book-grid" id="ot-books"></div>
    </section>

    <section class="testament-section">
      <h2>New Testament</h2>
      <div class="book-grid" id="nt-books"></div>
    </section>
  </main>

  <!-- Reading View -->
  <main id="reading-view" class="view hidden">
    <div class="reading-header">
      <span id="progress" class="progress-label"></span>
      <button id="switch-book-btn" class="text-btn">Switch Book</button>
    </div>

    <h1 id="chapter-reference" class="chapter-title"></h1>

    <div id="chapter-content" class="chapter-text">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p>Loading chapter...</p>
      </div>
    </div>

    <div class="read-btn-container">
      <button id="read-btn" class="read-button">I Read It</button>
    </div>
  </main>

  <!-- Success View -->
  <main id="success-view" class="view hidden">
    <div class="success-content">
      <div class="success-icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="32" cy="32" r="28"/>
          <path d="M20 33l8 8 16-16"/>
        </svg>
      </div>
      <h1>Well Done</h1>
      <p class="subtitle">You've completed today's reading.<br>Social media is now unblocked.</p>
      <p class="success-verse">"Your word is a lamp to my feet and a light to my path."<br><span class="verse-ref">Psalm 119:105</span></p>
    </div>
  </main>

  <script src="bible-books.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
